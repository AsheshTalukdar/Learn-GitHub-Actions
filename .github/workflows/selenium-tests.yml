name: Selenium TestNG Allure CI

permissions:
  contents: write

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run Tests
        run: |
          mvn clean test \
            -Dbrowser=chrome \
            -Dheadless=true

      # -------------------------
      # Generate Allure Report (IMPORTANT CHANGE)
      # -------------------------
      - name: Generate Allure Report
        run: |
          mvn allure:report

      # -------------------------
      # Fix: copy correct report folder
      # -------------------------
      - name: Prepare Pages folder
        run: |
          rm -rf gh-pages
          mkdir gh-pages
          cp -r target/site/allure-maven-plugin/* gh-pages/

      # -------------------------
      # Deploy
      # -------------------------
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: gh-pages
          force_orphan: true

      # -------------------------
      # Summary
      # -------------------------
      - name: Add report link
        run: |
          echo "## Allure Report" >> $GITHUB_STEP_SUMMARY
          echo "👉 https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/" >> $GITHUB_STEP_SUMMARY