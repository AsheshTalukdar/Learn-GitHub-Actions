name: Selenium TestNG Allure CI

permissions:
  contents: write

on:

  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  schedule:
    - cron: '0 2 * * *'

  workflow_dispatch:
    inputs:

      branch:
        description: 'Branch to checkout and test'
        required: true
        default: 'main'
        type: string

      browser:
        description: 'Browser'
        required: true
        default: 'chrome'
        type: choice
        options:
          - chrome
          - firefox

      headless:
        description: 'Run headless?'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:

  test:

    runs-on: ubuntu-latest

    steps:

      # ---------------------------
      # Checkout source code
      # ---------------------------
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      # ---------------------------
      # Setup Java + Maven cache
      # ---------------------------
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # ---------------------------
      # Run Selenium tests
      # ---------------------------
      - name: Run Tests
        run: |
          mvn clean test \
            -Dbrowser=${{ github.event.inputs.browser || 'chrome' }} \
            -Dheadless=${{ github.event.inputs.headless || 'true' }}

      # ---------------------------
      # Load previous Allure history (safe for first run)
      # ---------------------------
      - name: Load previous report history
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      # ---------------------------
      # Generate Allure Report
      # ---------------------------
      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: allure-results
          allure_history: allure-history
          keep_reports: 20

      # ---------------------------
      # Upload artifact (backup)
      # ---------------------------
      - name: Upload Allure Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: allure-history
          retention-days: 20

      # ---------------------------
      # Publish Allure Report to GitHub Pages
      # ---------------------------
      - name: Publish To GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
          force_orphan: true

      # ---------------------------
      # Add report link in workflow summary
      # ---------------------------
      - name: Add report link to summary
        if: always()
        run: |
          echo "## Allure Report" >> $GITHUB_STEP_SUMMARY
          echo "[Open Report](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/)" >> $GITHUB_STEP_SUMMARY