name: Selenium TestNG Allure CI

permissions:
  contents: write

on:

  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:
    inputs:

      branch:
        description: 'Branch to checkout'
        required: true
        default: 'main'
        type: string

      browser:
        description: 'Browser'
        required: true
        default: 'chrome'
        type: choice
        options:
          - chrome
          - firefox

      headless:
        description: 'Headless mode'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:

  test:

    runs-on: ubuntu-latest

    steps:

      # --------------------------
      # Checkout code
      # --------------------------
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      # --------------------------
      # Java setup
      # --------------------------
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # --------------------------
      # Run tests
      # --------------------------
      - name: Run Tests
        run: |
          mvn clean test \
            -Dbrowser=${{ github.event.inputs.browser || 'chrome' }} \
            -Dheadless=${{ github.event.inputs.headless || 'true' }}

      # --------------------------
      # Generate Allure Report
      # --------------------------
      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: allure-results
          allure_history: allure-history
          keep_reports: 20

      # --------------------------
      # Upload artifact (optional backup)
      # --------------------------
      - name: Upload Allure Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: allure-history

      # --------------------------
      # Publish to GitHub Pages
      # --------------------------
      - name: Publish To GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
          force_orphan: true

      # --------------------------
      # Add link to summary
      # --------------------------
      - name: Add report link
        if: always()
        run: |
          echo "## Allure Report" >> $GITHUB_STEP_SUMMARY
          echo "[Open Report](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/)" >> $GITHUB_STEP_SUMMARY